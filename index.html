<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صحة الطالب من منظور بحثي: قياس جودة النوم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f2e;
    --bg2: #1a1a3e;
    --card: #1e1e4a;
    --card2: #252558;
    --primary: #7c6af7;
    --primary-hover: #6a57e8;
    --primary-fg: #ffffff;
    --border: #2e2e6a;
    --text: #e8e8ff;
    --muted: #8888bb;
    --accent: #a78bfa;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
  }

  body {
    font-family: 'Cairo', 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 85%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 35%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 55%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ── WELCOME ── */
  #screen-welcome {
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }
  .welcome-moon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 24px #7c6af7aa);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  .welcome-title {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    line-height: 1.4;
    background: linear-gradient(135deg, #c4b5fd, #818cf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 1rem;
  }
  .welcome-sub {
    color: var(--muted);
    font-size: 1rem;
    max-width: 500px;
    line-height: 1.8;
    margin-bottom: 2.5rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--primary), #6366f1);
    color: var(--primary-fg);
    border: none;
    padding: 1rem 3rem;
    border-radius: 9999px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,106,247,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-2px) scale(1.04); box-shadow: 0 12px 32px rgba(124,106,247,0.55); }
  .btn-primary:active { transform: scale(0.97); }

  /* ── QUIZ ── */
  #screen-quiz { padding: 1.5rem 1rem; }

  /* Progress bar */
  .progress-wrap { max-width: 700px; margin: 0 auto 0.5rem; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
  .progress-label { font-size: 0.85rem; color: var(--muted); }
  .progress-bar-bg { background: var(--border); border-radius: 9999px; height: 6px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 9999px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }

  /* Question card */
  .q-outer { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 0; }
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1.5rem;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    animation: fadeSlide 0.3s ease;
  }
  @keyframes fadeSlide { from{opacity:0;transform:translateX(-24px)} to{opacity:1;transform:translateX(0)} }
  .q-card.slide-back { animation: fadeSlideBack 0.3s ease; }
  @keyframes fadeSlideBack { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
  .q-title { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 0.5rem; }
  .q-sub { font-size: 0.95rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }

  /* Radio cards */
  .radio-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .radio-card {
    display: flex; align-items: center; gap: 0.75rem;
    background: var(--card2); border: 2px solid var(--border);
    border-radius: 1rem; padding: 1rem 1.25rem;
    cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s;
    user-select: none;
  }
  .radio-card:hover { border-color: var(--primary); background: rgba(124,106,247,0.1); transform: translateY(-1px); }
  .radio-card.selected { border-color: var(--primary); background: rgba(124,106,247,0.18); }
  .radio-dot {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--muted); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .radio-card.selected .radio-dot { border-color: var(--primary); background: var(--primary); }
  .radio-dot::after {
    content: ''; width: 8px; height: 8px; border-radius: 50%;
    background: white; opacity: 0; transition: opacity 0.15s;
  }
  .radio-card.selected .radio-dot::after { opacity: 1; }
  .radio-label { font-size: 1rem; font-weight: 600; }

  /* Number / Time inputs */
  .input-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  .input-label { color: var(--muted); font-size: 0.9rem; }
  .big-input {
    text-align: center; font-size: 2.5rem; font-weight: 700;
    font-family: inherit;
    padding: 1rem 1.5rem; background: var(--card2);
    border: 2px solid var(--border); border-radius: 1rem;
    color: var(--text); outline: none; width: 100%; max-width: 280px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .big-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124,106,247,0.2); }
  .big-input::-webkit-inner-spin-button, .big-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(0.5); cursor: pointer; }

  /* Grid question */
  .grid-title { font-size: 0.95rem; color: var(--muted); margin-bottom: 1rem; }
  .grid-table { width: 100%; border-collapse: separate; border-spacing: 0 0.5rem; }
  .grid-head th { font-size: 0.78rem; color: var(--muted); font-weight: 600; padding: 0.25rem 0.5rem; text-align: center; }
  .grid-head th:first-child { text-align: right; }
  .grid-row td { padding: 0.35rem 0.4rem; }
  .grid-row td:first-child { font-size: 0.9rem; padding-right: 0.2rem; }
  .grid-row:nth-child(even) td { background: rgba(255,255,255,0.03); }
  .grid-row td:first-child { border-radius: 0.5rem 0 0 0.5rem; }
  .grid-row td:last-child { border-radius: 0 0.5rem 0.5rem 0; }
  .grid-btn {
    display: block; width: 100%; padding: 0.45rem 0.2rem;
    background: var(--card2); border: 2px solid var(--border);
    border-radius: 0.5rem; cursor: pointer; color: var(--muted);
    font-size: 0.78rem; font-family: inherit; font-weight: 600;
    transition: border-color 0.12s, background 0.12s, color 0.12s;
  }
  .grid-btn:hover { border-color: var(--primary); color: var(--accent); }
  .grid-btn.sel { border-color: var(--primary); background: rgba(124,106,247,0.2); color: var(--primary-fg); }

  /* Navigation */
  .nav-bar { max-width: 700px; margin: 1.5rem auto 0; display: flex; justify-content: space-between; align-items: center; }
  .btn-ghost {
    background: transparent; border: 2px solid transparent;
    color: var(--muted); padding: 0.75rem 1.5rem;
    border-radius: 9999px; font-size: 1rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-ghost:hover:not(:disabled) { background: var(--card); color: var(--text); }
  .btn-ghost:disabled { opacity: 0; pointer-events: none; }
  .btn-next {
    background: linear-gradient(135deg, var(--primary), #6366f1);
    color: white; border: none; padding: 0.75rem 2.5rem;
    border-radius: 9999px; font-size: 1rem; font-weight: 700;
    font-family: inherit; cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,106,247,0.4);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  }
  .btn-next:hover:not(:disabled) { transform: translateY(-2px) scale(1.04); box-shadow: 0 8px 24px rgba(124,106,247,0.55); }
  .btn-next:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ── RESULTS ── */
  #screen-results { align-items: center; justify-content: flex-start; padding: 2rem 1rem; }
  .results-inner { width: 100%; max-width: 700px; margin: 0 auto; }
  .results-title { font-size: 1.8rem; font-weight: 900; text-align: center; background: linear-gradient(135deg, #c4b5fd, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.25rem; }
  .results-sub { text-align: center; color: var(--muted); margin-bottom: 2rem; }

  .score-circle-wrap { display: flex; justify-content: center; margin-bottom: 2rem; }
  .score-circle {
    width: 160px; height: 160px; border-radius: 50%;
    border: 6px solid var(--primary);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(124,106,247,0.35);
    background: var(--card);
  }
  .score-num { font-size: 3rem; font-weight: 900; color: var(--accent); line-height: 1; }
  .score-max { font-size: 0.85rem; color: var(--muted); }
  .score-label-chip {
    display: inline-block; margin-top: 0.4rem;
    padding: 0.2rem 0.75rem; border-radius: 9999px;
    font-size: 0.8rem; font-weight: 700;
  }

  .interp-card {
    border-radius: 1rem; padding: 1rem 1.25rem;
    margin-bottom: 1.5rem; border: 1px solid;
    font-size: 0.95rem; line-height: 1.7;
  }

  .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 2rem; }
  @media(max-width:500px){ .comp-grid { grid-template-columns: 1fr; } }
  .comp-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 1rem; padding: 1rem;
  }
  .comp-name { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.3rem; }
  .comp-score-row { display: flex; align-items: center; gap: 0.5rem; }
  .comp-score { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
  .comp-bar-bg { flex: 1; background: var(--border); border-radius: 9999px; height: 6px; overflow: hidden; }
  .comp-bar-fill { height: 100%; border-radius: 9999px; background: linear-gradient(90deg, var(--primary), #818cf8); transition: width 0.6s ease; }

  .efficiency-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 1rem; padding: 1rem 1.25rem; margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .eff-pct { font-size: 2rem; font-weight: 900; color: var(--accent); white-space: nowrap; }
  .eff-label { color: var(--muted); font-size: 0.9rem; }

  .btn-restart { display: block; margin: 0 auto 3rem; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- WELCOME -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-moon">🌙</div>
    <h1 class="welcome-title">صحة الطالب من منظور بحثي<br/>قياس جودة النوم</h1>
    <p class="welcome-sub">
      هذا الاستبيان يقيس جودة نومك خلال الشهر الماضي باستخدام مؤشر بيتسبرغ لجودة النوم (PSQI).
      أجب بصدق عن كل سؤال للحصول على تقييم دقيق.
    </p>
    <button class="btn-primary" onclick="startQuiz()">ابدأ الاستبيان</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-top">
        <span class="progress-label" id="prog-text">السؤال 1 من 10</span>
        <span class="progress-label" id="prog-pct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    </div>
    <div class="q-outer">
      <div class="q-card" id="q-card"><!-- rendered by JS --></div>
    </div>
    <div class="nav-bar">
      <button class="btn-ghost" id="btn-prev" onclick="prevStep()" disabled>السابق</button>
      <button class="btn-next" id="btn-next" onclick="nextStep()">التالي</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="results-inner" id="results-inner"><!-- rendered by JS --></div>
  </div>

</div>
<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const TOTAL = 10;
let step = 1;
let goingBack = false;

const ans = {
  q1_bedtime: '',
  q2_sleep_latency: null,
  q3_wake_time: '',
  q4_hours: null,
  q5a: null,
  q5b: null, q5c: null, q5d: null, q5e: null,
  q5f: null, q5g: null, q5h: null, q5i: null, q5j: null,
  q6: null, q7: null, q8: null, q9: null,
};

const FREQ = [
  { v: 0, l: 'ليس خلال الشهر الماضي' },
  { v: 1, l: 'أقل من مرة أسبوعيًا' },
  { v: 2, l: 'مرة أو مرتين أسبوعيًا' },
  { v: 3, l: 'ثلاث مرات أو أكثر أسبوعيًا' },
];

// ─────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────
function startQuiz() {
  show('screen-quiz');
  render();
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function nextStep() {
  if (step < TOTAL) {
    goingBack = false;
    step++;
    render();
  } else {
    showResults();
  }
}

function prevStep() {
  if (step > 1) {
    goingBack = true;
    step--;
    render();
  }
}

function render() {
  // Progress
  const pct = Math.round(((step - 1) / TOTAL) * 100);
  document.getElementById('prog-text').textContent = `السؤال ${step} من ${TOTAL}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = pct + '%';

  // Card animation
  const card = document.getElementById('q-card');
  card.className = 'q-card' + (goingBack ? ' slide-back' : '');
  // force reflow
  void card.offsetWidth;

  card.innerHTML = buildStep(step);

  // Buttons
  document.getElementById('btn-prev').disabled = step === 1;
  const nextBtn = document.getElementById('btn-next');
  nextBtn.textContent = step === TOTAL ? 'إظهار النتائج' : 'التالي';
  updateNextBtn();
}

function updateNextBtn() {
  document.getElementById('btn-next').disabled = isDisabled(step);
}

function isDisabled(s) {
  switch (s) {
    case 1: return !ans.q1_bedtime;
    case 2: return ans.q2_sleep_latency === null;
    case 3: return !ans.q3_wake_time;
    case 4: return ans.q4_hours === null;
    case 5: return ans.q5a === null;
    case 6: return [ans.q5b,ans.q5c,ans.q5d,ans.q5e,ans.q5f,ans.q5g,ans.q5h,ans.q5i,ans.q5j].some(v => v === null);
    case 7: return ans.q6 === null;
    case 8: return ans.q7 === null;
    case 9: return ans.q8 === null;
    case 10: return ans.q9 === null;
    default: return false;
  }
}

// ─────────────────────────────────────────────
// Step builder
// ─────────────────────────────────────────────
function buildStep(s) {
  switch (s) {
    case 1: return card('وقت النوم',
      'خلال الشهر الماضي، في أي وقت كنت تذهب عادةً إلى السرير ليلًا؟',
      `<div class="input-wrap">
        <label class="input-label">اختر الوقت</label>
        <input class="big-input" type="time" value="${ans.q1_bedtime}"
          oninput="ans.q1_bedtime=this.value;updateNextBtn()">
       </div>`);

    case 2: return card('الاستغراق في النوم',
      'خلال الشهر الماضي، كم من الوقت (بالدقائق) كنت تحتاج عادةً حتى تغفو كل ليلة؟',
      `<div class="input-wrap">
        <label class="input-label">عدد الدقائق</label>
        <input class="big-input" type="number" min="0" max="180" placeholder="0"
          value="${ans.q2_sleep_latency ?? ''}"
          oninput="ans.q2_sleep_latency=this.value===''?null:Number(this.value);updateNextBtn()">
       </div>`);

    case 3: return card('وقت الاستيقاظ',
      'خلال الشهر الماضي، في أي وقت كنت تستيقظ عادةً في الصباح؟',
      `<div class="input-wrap">
        <label class="input-label">اختر الوقت</label>
        <input class="big-input" type="time" value="${ans.q3_wake_time}"
          oninput="ans.q3_wake_time=this.value;updateNextBtn()">
       </div>`);

    case 4: return card('ساعات النوم الفعلية',
      'خلال الشهر الماضي، كم عدد ساعات النوم الفعلية التي حصلت عليها ليلًا؟ (قد يختلف ذلك عن عدد الساعات التي قضيتها في السرير)',
      `<div class="input-wrap">
        <label class="input-label">عدد الساعات</label>
        <input class="big-input" type="number" min="0" max="24" step="0.5" placeholder="7.5"
          value="${ans.q4_hours ?? ''}"
          oninput="ans.q4_hours=this.value===''?null:Number(this.value);updateNextBtn()">
       </div>`);

    case 5: return card('اضطرابات النوم',
      'خلال الشهر الماضي، كم مرة واجهت صعوبة في النوم بسبب أنك لا تستطيع النوم خلال 30 دقيقة؟',
      radioList(FREQ, 'q5a'));

    case 6: return card('أسباب أخرى لاضطرابات النوم', '',
      gridQ('خلال الشهر الماضي، كم مرة واجهت صعوبة في النوم بسبب:', [
        ['q5b', 'تستيقظ في منتصف الليل أو في الصباح الباكر'],
        ['q5c', 'تحتاج إلى النهوض لاستخدام الحمام'],
        ['q5d', 'لا تستطيع التنفس بشكل مريح'],
        ['q5e', 'تسعل أو تشخر بصوت مرتفع'],
        ['q5f', 'تشعر بالبرد الشديد'],
        ['q5g', 'تشعر بالحر الشديد'],
        ['q5h', 'تراودك أحلام سيئة (كوابيس)'],
        ['q5i', 'تشعر بالألم'],
        ['q5j', 'سبب آخر'],
      ]));

    case 7: return card('جودة النوم العامة',
      'خلال الشهر الماضي، كيف تقيّم جودة نومك بشكل عام؟',
      radioList([
        {v:0,l:'جيدة جدًا'}, {v:1,l:'جيدة إلى حد ما'},
        {v:2,l:'سيئة إلى حد ما'}, {v:3,l:'سيئة جدًا'},
      ], 'q6'));

    case 8: return card('أدوية النوم',
      'خلال الشهر الماضي، كم مرة تناولت أدوية للمساعدة على النوم؟ (سواء بوصفة طبية أو أدوية تُباع دون وصفة)',
      radioList(FREQ, 'q7'));

    case 9: return card('صعوبة البقاء مستيقظًا',
      'خلال الشهر الماضي، كم مرة واجهت صعوبة في البقاء مستيقظًا أثناء القيادة أو تناول الوجبات أو المشاركة في نشاط اجتماعي؟',
      radioList([
        {v:0,l:'أبدًا'}, {v:1,l:'مرة أو مرتين'},
        {v:2,l:'مرة أو مرتين أسبوعيًا'}, {v:3,l:'ثلاث مرات أو أكثر أسبوعيًا'},
      ], 'q8'));

    case 10: return card('الحماس والنشاط',
      'خلال الشهر الماضي، إلى أي درجة شكّل نقص الحماس لإنجاز الأمور مشكلة لديك؟',
      radioList([
        {v:0,l:'لا توجد مشكلة إطلاقًا'}, {v:1,l:'مشكلة بسيطة جدًا'},
        {v:2,l:'مشكلة إلى حد ما'}, {v:3,l:'مشكلة كبيرة جدًا'},
      ], 'q9'));

    default: return '';
  }
}

function card(title, sub, body) {
  return `<h2 class="q-title">${title}</h2>
    ${sub ? `<p class="q-sub">${sub}</p>` : ''}
    ${body}`;
}

function radioList(options, key) {
  return `<div class="radio-list">${options.map(o => {
    const sel = ans[key] === o.v ? ' selected' : '';
    return `<div class="radio-card${sel}" onclick="pick('${key}',${o.v},this)">
      <div class="radio-dot"></div>
      <span class="radio-label">${o.l}</span>
    </div>`;
  }).join('')}</div>`;
}

function pick(key, val, el) {
  ans[key] = val;
  el.closest('.radio-list').querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  updateNextBtn();
}

function gridQ(title, rows) {
  const headers = ['', 'ليس خلال\nالشهر', 'أقل من\nمرة', 'مرة أو\nمرتين', 'ثلاث مرات\nأو أكثر'];
  const hCells = headers.map((h,i) => `<th>${h.replace('\n','<br>')}</th>`).join('');
  const rCells = rows.map(([id, label]) => {
    const btns = [0,1,2,3].map(v => {
      const sel = ans[id] === v ? ' sel' : '';
      return `<td><button class="grid-btn${sel}" onclick="pickGrid('${id}',${v},this)">${v === 0 ? '✕' : v === 1 ? '١' : v === 2 ? '٢' : '٣+'}</button></td>`;
    }).join('');
    return `<tr class="grid-row"><td>${label}</td>${btns}</tr>`;
  }).join('');
  return `<p class="grid-title">${title}</p>
    <div style="overflow-x:auto">
    <table class="grid-table">
      <thead class="grid-head"><tr>${hCells}</tr></thead>
      <tbody>${rCells}</tbody>
    </table></div>`;
}

function pickGrid(key, val, el) {
  ans[key] = val;
  el.closest('tr').querySelectorAll('.grid-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  updateNextBtn();
}

// ─────────────────────────────────────────────
// Scoring
// ─────────────────────────────────────────────
function score() {
  // C1
  const c1 = ans.q6 ?? 0;

  // C2
  const q2 = ans.q2_sleep_latency ?? 0;
  let q2s = q2 <= 15 ? 0 : q2 <= 30 ? 1 : q2 <= 60 ? 2 : 3;
  const c2sum = q2s + (ans.q5a ?? 0);
  const c2 = c2sum === 0 ? 0 : c2sum <= 2 ? 1 : c2sum <= 4 ? 2 : 3;

  // C3
  const h = ans.q4_hours ?? 0;
  const c3 = h > 7 ? 0 : h >= 6 ? 1 : h >= 5 ? 2 : 3;

  // C4 efficiency
  let effPct = 0;
  if (ans.q1_bedtime && ans.q3_wake_time && h > 0) {
    const [bH, bM] = ans.q1_bedtime.split(':').map(Number);
    const [wH, wM] = ans.q3_wake_time.split(':').map(Number);
    let bed = new Date(); bed.setHours(bH, bM, 0, 0);
    let wake = new Date(); wake.setHours(wH, wM, 0, 0);
    if (wake <= bed) wake.setDate(wake.getDate() + 1);
    const tib = (wake - bed) / 3600000;
    effPct = (h / tib) * 100;
  }
  const c4 = effPct > 85 ? 0 : effPct >= 75 ? 1 : effPct >= 65 ? 2 : effPct > 0 ? 3 : 0;

  // C5
  const c5sum = [ans.q5b,ans.q5c,ans.q5d,ans.q5e,ans.q5f,ans.q5g,ans.q5h,ans.q5i,ans.q5j].reduce((a,v)=>a+(v??0),0);
  const c5 = c5sum === 0 ? 0 : c5sum <= 9 ? 1 : c5sum <= 18 ? 2 : 3;

  // C6
  const c6 = ans.q7 ?? 0;

  // C7
  const c7sum = (ans.q8 ?? 0) + (ans.q9 ?? 0);
  const c7 = c7sum === 0 ? 0 : c7sum <= 2 ? 1 : c7sum <= 4 ? 2 : 3;

  const global = c1+c2+c3+c4+c5+c6+c7;
  return { global, c1, c2, c3, c4, c5, c6, c7, effPct };
}

// ─────────────────────────────────────────────
// Results
// ─────────────────────────────────────────────
function showResults() {
  const r = score();
  const pct = Math.min(100, Math.round(r.effPct));

  let quality, qColor, qBg, chipBg;
  if (r.global <= 5) {
    quality = 'جودة نوم جيدة'; qColor = '#34d399'; qBg = 'rgba(52,211,153,0.1)'; chipBg = 'rgba(52,211,153,0.2)';
  } else if (r.global <= 10) {
    quality = 'جودة نوم متوسطة'; qColor = '#fbbf24'; qBg = 'rgba(251,191,36,0.1)'; chipBg = 'rgba(251,191,36,0.2)';
  } else {
    quality = 'جودة نوم ضعيفة'; qColor = '#f87171'; qBg = 'rgba(248,113,113,0.1)'; chipBg = 'rgba(248,113,113,0.2)';
  }

  const components = [
    { name: 'جودة النوم الذاتية', score: r.c1 },
    { name: 'كمون النوم', score: r.c2 },
    { name: 'مدة النوم', score: r.c3 },
    { name: 'كفاءة النوم الاعتيادية', score: r.c4 },
    { name: 'اضطرابات النوم', score: r.c5 },
    { name: 'استخدام أدوية النوم', score: r.c6 },
    { name: 'ضعف الأداء النهاري', score: r.c7 },
  ];

  const compCards = components.map(c => `
    <div class="comp-card">
      <div class="comp-name">${c.name}</div>
      <div class="comp-score-row">
        <span class="comp-score">${c.score}</span>
        <div class="comp-bar-bg"><div class="comp-bar-fill" style="width:${(c.score/3)*100}%"></div></div>
        <span style="font-size:0.8rem;color:var(--muted);">/3</span>
      </div>
    </div>`).join('');

  document.getElementById('results-inner').innerHTML = `
    <h1 class="results-title">نتائج تقييم جودة النوم</h1>
    <p class="results-sub">مؤشر بيتسبرغ لجودة النوم (PSQI) — الشهر الماضي</p>

    <div class="score-circle-wrap">
      <div class="score-circle">
        <span class="score-num">${r.global}</span>
        <span class="score-max">من 21</span>
        <span class="score-label-chip" style="background:${chipBg};color:${qColor}">${quality}</span>
      </div>
    </div>

    <div class="interp-card" style="background:${qBg};border-color:${qColor};color:${qColor}">
      ${r.global <= 5
        ? '✅ درجتك تشير إلى جودة نوم جيدة. استمر في الحفاظ على عاداتك الصحية.'
        : r.global <= 10
        ? '⚠️ درجتك تشير إلى بعض اضطرابات النوم. قد يفيدك تحسين بعض عادات النوم.'
        : '❗ درجتك تشير إلى اضطرابات نوم ملحوظة. يُنصح باستشارة متخصص.'}
    </div>

    <div class="comp-grid">${compCards}</div>

    ${r.effPct > 0 ? `
    <div class="efficiency-card">
      <div class="eff-pct">${pct}%</div>
      <div>
        <div style="font-weight:700;margin-bottom:0.2rem;">كفاءة النوم</div>
        <div class="eff-label">نسبة وقت النوم الفعلي إلى الوقت الكلي في السرير<br/>
          ${pct >= 85 ? '✅ كفاءة ممتازة' : pct >= 75 ? '⚠️ كفاءة مقبولة' : '❗ كفاءة منخفضة'}</div>
      </div>
    </div>` : ''}

    <button class="btn-primary btn-restart" onclick="restart()">إعادة الاستبيان</button>
  `;

  show('screen-results');
  window.scrollTo(0, 0);
}

function restart() {
  Object.keys(ans).forEach(k => ans[k] = typeof ans[k] === 'string' ? '' : null);
  step = 1;
  goingBack = false;
  show('screen-quiz');
  render();
}
</script>
